<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Car Racing</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: Arial; overflow: hidden; }
h1 { color: #e94560; margin-bottom: 8px; font-size: 24px; }
#score { color: #fff; font-size: 18px; margin-bottom: 8px; }
canvas { display: block; border: 3px solid #e94560; border-radius: 8px; }
#startBtn { margin-top: 12px; padding: 14px 40px; background: #e94560; color: white; border: none; border-radius: 8px; font-size: 20px; cursor: pointer; }
#gameOver { display: none; color: #e94560; font-size: 22px; margin-top: 8px; font-weight: bold; text-align: center; }
#controls { display: flex; gap: 20px; margin-top: 12px; }
#controls button { padding: 18px 30px; font-size: 24px; background: #333; color: #fff; border: 2px solid #e94560; border-radius: 10px; cursor: pointer; user-select: none; }
</style>
</head>
<body>
<h1>🏎️ Car Racing</h1>
<div id="score">Score: 0</div>
<canvas id="c"></canvas>
<div id="gameOver">Game Over! 💥<br><small>اضغط Restart</small></div>
<button id="startBtn" onclick="startGame()">▶ Start</button>
<div id="controls">
  <button onpointerdown="keys.left=true" onpointerup="keys.left=false">◀</button>
  <button onpointerdown="keys.right=true" onpointerup="keys.right=false">▶</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = Math.min(window.innerWidth - 20, 340);
const H = Math.min(window.innerHeight - 200, 500);
canvas.width = W;
canvas.height = H;

let score = 0, speed = 4, frame = 0, running = false, raf;
let enemies = [], lines = [];
const keys = { left: false, right: false };

const player = { x: W/2 - 20, y: H - 90, w: 40, h: 65 };

document.addEventListener('keydown', e => {
  if(e.key === 'ArrowLeft') keys.left = true;
  if(e.key === 'ArrowRight') keys.right = true;
});
document.addEventListener('keyup', e => {
  if(e.key === 'ArrowLeft') keys.left = false;
  if(e.key === 'ArrowRight') keys.right = false;
});

function initLines() {
  lines = [];
  for(let i = 0; i < 5; i++) lines.push({ y: i * (H/4) });
}

function drawCar(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, 6);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillRect(x+5, y+8, w-10, 15);
  ctx.fillRect(x+5, y+h-23, w-10, 13);
  ctx.fillStyle = '#111';
  ctx.fillRect(x-5, y+6, 8, 15);
  ctx.fillRect(x+w-3, y+6, 8, 15);
  ctx.fillRect(x-5, y+h-22, 8, 15);
  ctx.fillRect(x+w-3, y+h-22, 8, 15);
}

function loop() {
  ctx.fillStyle = '#222';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#e94560';
  ctx.fillRect(0, 0, 8, H);
  ctx.fillRect(W-8, 0, 8, H);

  lines.forEach(l => {
    l.y += speed;
    if(l.y > H) l.y = -60;
    ctx.fillStyle = '#fff';
    ctx.fillRect(W/2-3, l.y, 6, 50);
  });

  frame++;
  if(frame % 70 === 0) {
    const colors = ['#ff4757','#ffa502','#2ed573','#ff6b81','#7bed9f'];
    enemies.push({
      x: 8 + Math.random() * (W - 56),
      y: -70, w: 40, h: 65,
      color: colors[Math.floor(Math.random()*5)]
    });
  }
  if(frame % 400 === 0 && speed < 12) speed += 0.5;

  enemies = enemies.filter(e => {
    e.y += speed;
    drawCar(e.x, e.y, e.w, e.h, e.color);
    if(e.y > H) { score++; document.getElementById('score').textContent = 'Score: '+score; return false; }
    if(player.x < e.x+e.w && player.x+player.w > e.x && player.y < e.y+e.h && player.y+player.h > e.y) {
      endGame(); return false;
    }
    return true;
  });

  if(keys.left && player.x > 8) player.x -= 6;
  if(keys.right && player.x < W - player.w - 8) player.x += 6;

  drawCar(player.x, player.y, player.w, player.h, '#00d2ff');
  raf = requestAnimationFrame(loop);
}

function startGame() {
  score = 0; speed = 4; frame = 0;
  enemies = []; player.x = W/2 - 20;
  document.getElementById('score').textContent = 'Score: 0';
  document.getElementById('gameOver').style.display = 'none';
  document.getElementById('startBtn').textContent = '🔄 Restart';
  initLines();
  cancelAnimationFrame(raf);
  running = true;
  loop();
}

function endGame() {
  cancelAnimationFrame(raf);
  running = false;
  document.getElementById('gameOver').style.display = 'block';
}

ctx.fillStyle = '#222';
ctx.fillRect(0,0,W,H);
ctx.fillStyle = '#e94560';
ctx.font = 'bold 20px Arial';
ctx.textAlign = 'center';
ctx.fillText('🏎️ اضغط Start!', W/2, H/2);
</script>
</body>
</html>
